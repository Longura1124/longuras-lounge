{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-4">
        <h1 style="font-family:'Orbitron',sans-serif; color:white; letter-spacing:0.1em;">
            Login
        </h1>

        <div style="width:60px; height:3px;
                    background:linear-gradient(90deg,#63b3ed,#ed8936);
                    margin:12px auto 0;
                    border-radius:2px;">
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-md-6">

            {% if error %}
            <div class="alert alert-danger"
                 style="background:rgba(220,53,69,0.15);
                        border:1px solid rgba(220,53,69,0.4);
                        color:#ff6b6b;">
                {{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('login') }}"
                  method="POST"
                  style="background:rgba(255,255,255,0.03);
                         border:1px solid rgba(255,255,255,0.08);
                         border-radius:16px;
                         padding:40px;">

                <div class="mb-3">
                    <input type="text"
                           class="form-control"
                           id="inputUsername"
                           name="username"
                           placeholder="Username"
                           required
                           style="background:rgba(255,255,255,0.05);
                                  border:1px solid rgba(255,255,255,0.1);
                                  color:white;
                                  border-radius:8px;
                                  padding:12px 16px;">
                </div>

                <div class="mb-3">
                    <input type="password"
                           class="form-control"
                           id="inputPassword"
                           name="password"
                           placeholder="Password"
                           required
                           style="background:rgba(255,255,255,0.05);
                                  border:1px solid rgba(255,255,255,0.1);
                                  color:white;
                                  border-radius:8px;
                                  padding:12px 16px;">
                </div>

                <div class="text-end mb-4">
                    <a href="{{ url_for('forgot_password') }}"
                       style="color:#a0aec0;
                              font-size:0.85rem;
                              text-decoration:none;">
                        Forgot your password?
                    </a>
                </div>

                <div class="d-grid">
                    <button type="submit"
                            class="btn"
                            style="background:linear-gradient(90deg,#63b3ed,#4a90d9);
                                   color:white;
                                   border:none;
                                   border-radius:8px;
                                   padding:12px;
                                   font-family:'Orbitron',sans-serif;
                                   font-size:0.85rem;
                                   letter-spacing:0.1em;
                                   width:100%;">
                        Sign In
                    </button>
                </div>

                <p class="text-center mt-3"
                   style="color:rgba(255,255,255,0.4);
                          font-size:0.9rem;">

                    Don't have an account?

                    <a href="{{ url_for('register') }}"
                       style="color:#63b3ed;">
                        Register
                    </a>
                </p>

                <p class="text-center"
                   style="font-size:0.9rem;">
                    <a href="{{ url_for('home') }}"
                       style="color:#a0aec0;
                              text-decoration:none;">
                        Continue as guest
                    </a>
                </p>

            </form>

        </div>
    </div>
</div>

{% endblock %}
