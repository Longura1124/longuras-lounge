{% extends "base.html" %}

{% block content %}
<div class="register_header">
    <h1>Login Page</h1>
</div>
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <form class="row g-3" style="width: 350px;">
        <div class="col-12">
            <label for="inputEmail" class="form-label">Gmail</label>
            <input type="email" class="form-control" id="inputEmail" placeholder="example@gmail.com">
        </div>
        <div class="col-12">
            <label for="inputPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="inputPassword">
        </div>
        <div class="col-12 text-end">
            <a href="{{ url_for('forgot_password') }}" style="color: #a0aec0; font-size: 0.85rem;">Forgot your password?</a>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary w-100">
                <a href="{{ url_for('home') }}" style="color: white; text-decoration: none;">Sign in</a>
            </button>
        </div>
        <div class="col-12 text-center mt-2">
            <span style="color: #a0aec0; font-size: 0.85rem;">Don't have an account? </span>
            <a href="{{ url_for('register') }}" style="color: #7c84f5; font-size: 0.85rem;">Register here</a>
        </div>
        <div class="col-12 text-center">
            <a href="{{ url_for('home') }}" style="color: #a0aec0; font-size: 0.85rem;">Continue as guest</a>
        </div>
    </form>
</div>
{% endblock %}
