{% extends 'base.html' %}

{% block title %}Free Games Page{% endblock %}

{% block content %}
<h2 style="color:white; font-family:'Orbitron',sans-serif; margin: 20px 0;">Free Games</h2>
<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for game in games %}
    <div class="col">
        <div class="card h-100">

            {% if game.img.startswith('http') %}
                <img src="{{ game.img }}" class="card-img-top" alt="{{ game.title }}" style="height: 200px; object-fit: cover;">
            {% else %}
                <img src="{{ game.img }}" class="card-img-top" alt="{{ game.title }}" style="height: 200px; object-fit: cover;">
            {% endif %}

            <div class="card-body d-flex flex-column">
                <h5 class="card-title">{{ game.title }}</h5>
                <p class="card-text">Rating: {{ game.rating }}</p>
                <a href="{{ url_for('game_details', game_id=game.id) }}" class="btn btn-outline-info w-100 mt-auto">View Game</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
